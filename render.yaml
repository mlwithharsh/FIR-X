services:
  - type: web
    name: fir-auto-backend
    runtime: python
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:///./generated/firai.db
      - key: GENERATED_DIR
        value: generated
      - key: PYTHON_VERSION
        value: 3.11.12
